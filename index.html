<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채연이의 칭찬 포도</title>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:#e9e9ec; display:flex; flex-direction:column; align-items:center;
    padding:14px; min-height:100vh; gap:10px;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif; color:#333; }

  .badge { font-size:12px; font-weight:700; padding:4px 12px; border-radius:14px; }
  .badge.admin { background:#7b2d8e; color:#fff; }
  .badge.viewer { background:#e3d3ec; color:#6a2d8a; }
  .status { font-size:12px; color:#999; height:16px; }
  .status.ok { color:#3a9b4a; } .status.err { color:#c0392b; }

  .wrap { position:relative; width:100%; max-width:480px; }
  .bg { width:100%; display:block; }
  .layer { position:absolute; inset:0; }

  /* 포도알 버튼 */
  .cell { position:absolute; transform:translate(-50%,-50%);
    border-radius:50%; border:none; background:transparent; padding:0; margin:0;
    display:flex; align-items:center; justify-content:center; transition:transform .1s ease; }
  .cell.clickable { cursor:pointer; }
  .cell.clickable:active { transform:translate(-50%,-50%) scale(0.86); }
  .cell.done { background:radial-gradient(circle at 35% 28%, rgba(180,90,210,.92), rgba(110,30,150,.95) 80%);
    box-shadow:0 0 0 2px rgba(255,255,255,.5) inset; }
  .stamp { opacity:0; transform:rotate(-12deg) scale(.3); }
  .cell.done .stamp { opacity:1; animation:pop .35s cubic-bezier(.34,1.56,.64,1); }
  @keyframes pop { 0%{transform:rotate(-12deg) scale(.3);opacity:0;}
    60%{transform:rotate(-12deg) scale(1.25);opacity:1;} 100%{transform:rotate(-12deg) scale(1);opacity:1;} }

  /* 이미지 위 오버레이: 제목 / 목표 입력 */
  .overlay { position:absolute; display:flex; align-items:center; justify-content:center; }
  .title-input, .goal-input {
    width:100%; height:100%; border:none; background:transparent;
    font-family:inherit; color:#5a2d6e; text-align:center; outline:none; resize:none; padding:2% 4%;
  }
  .title-text {
    width:100%; height:100%; display:flex; align-items:center; justify-content:center; text-align:center;
    font-weight:800; color:#5a2d6e; line-height:1.1; white-space:nowrap;
  }
  .title-input { font-weight:800; }
  .title-input::placeholder { color:#b89cc4; }
  .goal-input { color:#333; font-weight:600; line-height:1.3; }
  .goal-input::placeholder { color:#bbb; font-weight:500; }
  .goal-input:focus, .title-input:focus { background:rgba(255,255,255,0.35); border-radius:6px; }

  .progress { font-size:16px; font-weight:800; color:#6a2d8a; }

  .admin-tools { width:100%; max-width:480px; display:none; gap:8px; justify-content:center; flex-wrap:wrap; }
  .admin-tools.show { display:flex; }
  .toolbtn { border:1.5px solid #c4a0d6; background:#fff; color:#7b2d8e;
    border-radius:16px; padding:6px 14px; font-size:13px; font-weight:700; cursor:pointer; }
  .toolbtn:active { background:#f3eaf7; }

  .goalbar { width:100%; max-width:480px; display:flex; gap:8px; align-items:center; justify-content:center; }
  .btn { border:none; border-radius:18px; padding:8px 16px; font-size:13px; font-weight:700; cursor:pointer; }
  .btn-primary { background:#7b2d8e; color:#fff; } .btn-primary:disabled { background:#c9b3d2; cursor:default; }
  .save-hint { font-size:12px; color:#999; }

  .hint { font-size:11px; color:#aaa; text-align:center; max-width:480px; line-height:1.5; }
</style>
</head>

  }

    for(var i=0;i<cellEls.length;i++){ if(i<state.count) cellEls[i].classList.add("done"); else cellEls[i].classList.remove("done"); }

  function applyCount(c, remote){
    c=Math.max(0,Math.min(TOTAL,c)); state.count=c; paint();
    if(remote && window.GrapeBackend && window.GrapeBackend.writeCount) window.GrapeBackend.writeCount(c);
  }

  document.getElementById("resetAll").addEventListener("click", function(){ if(confirm("포도알을 모두 지울까요?")) applyCount(0,true); });

  // ---- Firebase 연결 훅 ----
  window.GrapeUI = {
    onRemoteUpdate: function(rm){
      if(typeof rm.count==="number"){ state.count=Math.max(0,Math.min(TOTAL,rm.count)); paint(); }
      if(typeof rm.goal==="string"){ state.goal=rm.goal; if(!goalDirty && document.activeElement!==goalInput) goalInput.value=rm.goal; }
    },
    setStatus:setStatus, isAdmin:isAdmin, boardId:(params.get("board")||"default")
  };

  function relayout(){ buildCells(); placeAllOverlays(); }
  if(bg.complete) relayout(); else bg.addEventListener("load", relayout);
  window.addEventListener("resize", relayout);
})();
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ===========================================================
  //  ① 여기에 Firebase 설정을 붙여넣으세요 (콘솔 > 프로젝트 설정 > 웹앱)
  // ===========================================================
  const firebaseConfig = {
    apiKey: "AIzaSyAMQMDmxGtkMiXmbCget5imwek_oyqmuE4",
    authDomain: "chae-grape.firebaseapp.com",
    projectId: "chae-grape",
    storageBucket: "chae-grape.firebasestorage.app",
    messagingSenderId: "225005570792",
    appId: "1:225005570792:web:e599a35e98dd49e5cf575d"
  };

  const UI = window.GrapeUI;
  if (!firebaseConfig.apiKey || firebaseConfig.apiKey.indexOf("PASTE") === 0) {
    if (UI) UI.setStatus("⚠ Firebase 설정 미입력 — 저장/공유가 아직 안 됩니다", "err");
  } else {
    try {
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const boardRef = doc(db, "boards", (UI ? UI.boardId : "default"));
      onSnapshot(boardRef, (snap) => {
        const d = snap.exists() ? snap.data() : { count:0, goal:"", title:"" };
        if (UI){ UI.onRemoteUpdate(d); UI.setStatus("실시간 연결됨", "ok"); }
      }, (err)=>{ if(UI) UI.setStatus("연결 오류: "+err.message, "err"); });

      window.GrapeBackend = {
        writeCount: async (c)=>{ try{ await setDoc(boardRef,{count:c},{merge:true}); }catch(e){ if(UI)UI.setStatus("저장 실패: "+e.message,"err"); } },
        writeGoal:  async (t)=>{ try{ await setDoc(boardRef,{goal:t},{merge:true}); return true; }catch(e){ if(UI)UI.setStatus("저장 실패: "+e.message,"err"); return false; } }
      };
    } catch(e){ if(UI) UI.setStatus("Firebase 초기화 실패: "+e.message, "err"); }
  }
</script>
